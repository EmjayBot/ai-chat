<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TEP Community Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "@mlc-ai/web-llm": "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.79/+esm"
  }
}
</script>
<style>
  :root { color-scheme: dark; }
    * { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
 .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
</style>
</head>
<body class="bg-[#030712] text-slate-200 antialiased">
<div class="min-h-screen flex flex-col">
  <header class="sticky top-0 z-40 border-b border-slate-800 bg-slate-950/80 glass">
    <div class="max-w-6xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 via-violet-500 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-violet-900/30 shrink-0">
            <span class="font-black text-white text- tracking-wider">TEP</span>
          </div>
          <div class="min-w-0">
            <h1 class="text- sm:text- font-semibold tracking-tight leading-tight">TEP Community Assistant</h1>
            <p class="text- text-slate-400 -mt-0.5 hidden sm:block">Local AI for forum.theeastpacific.com</p>
          </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3 flex-wrap justify-end">
          <div class="flex items-center gap-1.5">
            <label for="model" class="text- text-slate-400 hidden sm:block">Model</label>
            <select id="model" class="bg-slate-900/80 border border-slate-700 rounded-lg text-xs px-2.5 py-1.5 outline-none focus:ring-2 focus:ring-violet-500/50">
              <option value="Phi-3.5-mini-instruct-q4f16_1-MLC" selected>Phi-3.5 Mini</option>
              <option value="Llama-3.2-1B-Instruct-q4f32_1-MLC">Llama 3.2 1B</option>
            </select>
          </div>
          <!-- THREE TOGGLES - SAME STYLE -->
          <label class="flex items-center gap-2 bg-slate-900/60 border border-slate-800 rounded-lg px-2.5 py-1.5 cursor-pointer hover:bg-slate-900 transition">
            <input id="use-ai" type="checkbox" checked class="w-3.5 h-3.5 accent-violet-500 bg-slate-800 border-slate-600 rounded" />
            <span class="text- sm:text-xs text-slate-300">Use AI LLM</span>
          </label>
          <label class="flex items-center gap-2 bg-slate-900/60 border border-slate-800 rounded-lg px-2.5 py-1.5 cursor-pointer hover:bg-slate-900 transition">
            <input id="use-index" type="checkbox" checked class="w-3.5 h-3.5 accent-violet-500 bg-slate-800 border-slate-600 rounded" />
            <span class="text- sm:text-xs text-slate-300">Search forum</span>
          </label>
          <label class="flex items-center gap-2 bg-slate-900/60 border border-slate-800 rounded-lg px-2.5 py-1.5 cursor-pointer hover:bg-slate-900 transition">
            <input id="use-faq" type="checkbox" checked class="w-3.5 h-3.5 accent-violet-500 bg-slate-800 border-slate-600 rounded" />
            <span class="text- sm:text-xs text-slate-300">Use Assistant</span>
          </label>
        </div>
      </div>
    </div>
    <div class="border-t border-slate-900/80">
      <div class="max-w-6xl mx-auto px-4 py-1.5 flex items-center justify-between text- text-slate-500">
        <div id="index-status" class="truncate">Checking forum index…</div>
        <div id="model-status" class="shrink-0">Model: idle</div>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col max-w-6xl w-full mx-auto">
    <div id="chat" class="flex-1 overflow-y-auto px-4 py-6">
      <div class="max-w-3xl mx-auto space-y-5" id="messages"></div>
    </div>
    <div class="sticky bottom-0 z-30">
      <div class="h-6 bg-gradient-to-t from-[#030712] to-transparent pointer-events-none"></div>
      <div class="bg-[#030712]/95 border-t border-slate-900 px-4 pb-4 pt-2">
        <div class="max-w-3xl mx-auto">
          <div class="relative bg-slate-900/70 border border-slate-800 rounded-2xl shadow-2xl shadow-black/30">
            <textarea id="input" rows="1" placeholder="Ask about citizenship, laws, Concordat…" class="w-full bg-transparent resize-none outline-none px-4 py-3 pr- text- leading-6 placeholder-slate-500 max-h-"></textarea>
            <div class="absolute right-2 bottom-2 flex items-center gap-1.5">
              <button id="clear" class="px-2.5 py-1.5 text- rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300">Clear</button>
              <button id="send" disabled class="px-3 py-1.5 text- font-medium rounded-xl bg-violet-600 hover:bg-violet-500 disabled:opacity-50 text-white">Send</button>
            </div>
          </div>
          <p class="text- text-slate-600 mt-2 text-center">TEP Community Assistant • Runs 100% in your browser</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
import { CreateMLCEngine } from "@mlc-ai/web-llm";

const modelSelect = document.getElementById('model');
const useAI = document.getElementById('use-ai');
const useIndex = document.getElementById('use-index');
const useFAQ = document.getElementById('use-faq');
const indexStatus = document.getElementById('index-status');
const modelStatus = document.getElementById('model-status');
const messagesEl = document.getElementById('messages');
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clear');

let engine = null;
let forumIndex = [];
const systemPrompt = "You are the TEP community assistant. Answer concisely using forum data when provided.";
let messages = [{ role: "system", content: systemPrompt }];

// --- YOUR 3 CUSTOM RESPONSES (same names) ---
const FAQS = [
  { keys: ['citizen','citizenship','become a citizen','how to join'], title: 'Citizenship', text: `To become a citizen:\n1. Move WA nation to TEP\n2. Apply: https://forum.theeastpacific.com/t/citizenship-application\n3. Take oath\n4. Wait for Magister approval` },
  { keys: ['amendment','citizenship act','public official disclosure','poda'], title: 'Amendments', text: `Amendments to Citizenship Act & PODA:\n• Citizenship Act: https://forum.theeastpacific.com/t/citizenship-act\n• PODA: https://forum.theeastpacific.com/t/public-official-disclosure-act` },
  { keys: ['application','roster','citizenship applications','citizenship roster'], title: 'Applications & Roster', text: `Citizenship Applications and Roster:\n• Apply: https://forum.theeastpacific.com/t/citizenship-application\n• Roster: https://forum.theeastpacific.com/t/citizenship-roster` }
];
function checkFAQ(q){ const l=q.toLowerCase(); return FAQS.find(f=>f.keys.some(k=>l.includes(k))); }

fetch('./forum-index.json', { cache: 'no-store' })
.then(r => r.ok? r.json() : [])
.then(data => { forumIndex = data; indexStatus.textContent = `Loaded ${data.length} topics`; })
.catch(() => { indexStatus.textContent = 'No index found'; useIndex.checked=false; useIndex.disabled=true; });

function addMessage(role, text, sources=[]){
  const wrap=document.createElement('div'); wrap.className='flex gap-3 '+(role==='user'?'justify-end':'justify-start');
  const bubble=document.createElement('div'); bubble.className='max-w-[88%] rounded-2xl px-4 py-3 border '+(role==='user'?'bg-indigo-600/15 border-indigo-500/30':'bg-slate-900/80 border-slate-800');
  if(sources.length){ const s=document.createElement('div'); s.className='mb-2 flex flex-wrap gap-1.5'; sources.forEach(x=>{const a=document.createElement('a'); a.href=x.url; a.target='_blank'; a.className='text- px-2 py-1 rounded bg-slate-800 border border-slate-700'; a.textContent=x.title.slice(0,40); s.appendChild(a);}); bubble.appendChild(s); }
  const c=document.createElement('div'); c.className='whitespace-pre-wrap text-'; c.textContent=text; bubble.appendChild(c); wrap.appendChild(bubble); messagesEl.appendChild(wrap); chat.scrollTop=chat.scrollHeight; return c;
}

function searchIndex(q){ if(!forumIndex.length) return []; const terms=q.toLowerCase().split(/\W+/).filter(t=>t.length>2); return forumIndex.map(i=>{const t=(i.title||'').toLowerCase()+' '+(i.excerpt||'').toLowerCase(); let s=0; terms.forEach(w=>{if(t.includes(w))s++}); return {...i,score:s}}).filter(i=>i.score>0).sort((a,b)=>b.score-a.score).slice(0,3); }

async function initModel(id){
  if(!useAI.checked){ modelStatus.textContent='Model: off'; return; }
  if(engine){try{await engine.unload()}catch{}}; engine=null; sendBtn.disabled=true; modelStatus.textContent='Model: downloading…';
  try{ engine = await CreateMLCEngine(id, { initProgressCallback:p=>{ modelStatus.textContent=`Model: ${Math.round(p.progress*100)}%` } }); modelStatus.textContent='Model: ready'; sendBtn.disabled=false; }
  catch(e){ modelStatus.textContent='Model: error'; addMessage('assistant','Failed: '+e.message); }
}

async function handleSend(){
  const text=input.value.trim(); if(!text) return; input.value=''; addMessage('user',text);

  // 1. Custom Assistant
  if(useFAQ.checked){
    const faq = checkFAQ(text);
    if(faq){
      const sources = useIndex.checked? searchIndex(text) : [];
      addMessage('assistant', faq.text, sources);
      return;
    }
  }

  // 2. Forum only (AI off)
  if(useIndex.checked &&!useAI.checked){
    const sources = searchIndex(text);
    addMessage('assistant', sources.length? 'Top forum matches:' : 'No matches found', sources);
    return;
  }

  // 3. AI
  if(!useAI.checked){ addMessage('assistant','All features are off. Enable AI, Forum, or Assistant.'); return; }
  if(!engine){ addMessage('assistant','Model still loading...'); return; }

  let sources = useIndex.checked? searchIndex(text) : [];
  let ctx = text; if(sources.length) ctx = `Question: ${text}\n\nForum:\n${sources.map(s=>s.title+' - '+s.url).join('\n')}`;
  messages.push({role:'user',content:ctx}); const el=addMessage('assistant','',sources); sendBtn.disabled=true;
  try{ const s=await engine.chat.completions.create({messages,stream:true,temperature:0.3}); let out=''; for await(const c of s){ out+=c.choices[0].delta.content||''; el.textContent=out; } messages.push({role:'assistant',content:out}); }catch(e){el.textContent='Error: '+e.message} finally{sendBtn.disabled=false}
}

sendBtn.onclick=handleSend; clearBtn.onclick=()=>{messages=[{role:'system',content:systemPrompt}]; messagesEl.innerHTML='';}; input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}};
modelSelect.onchange=()=>initModel(modelSelect.value);
useAI.onchange=()=>{ if(useAI.checked) initModel(modelSelect.value); else { modelStatus.textContent='Model: off'; if(engine){engine.unload();engine=null} } };

initModel(modelSelect.value);
addMessage('assistant','Welcome! Toggle AI, Forum, and Assistant at the top. Try "citizenship".');
</script>
</body>
</html>
