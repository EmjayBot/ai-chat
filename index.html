<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEP Community Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">{"imports":{"@mlc-ai/web-llm":"https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.79/+esm"}}</script>
<style>:root{color-scheme:dark}*{scrollbar-width:thin}</style>
</head>
<body class="bg-[#030712] text-slate-200">
<div class="min-h-screen flex flex-col">
<header class="sticky top-0 z-40 border-b border-slate-800 bg-slate-950/80 backdrop-blur">
 <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 flex items-center justify-center font-black">TEP</div><h1 class="text-lg font-semibold">TEP Community Assistant</h1></div>
  <div class="flex items-center gap-3 text-xs">
   <label class="flex items-center gap-1.5 cursor-pointer"><input id="use-ai" type="checkbox" checked class="accent-violet-500"> Use AI model</label>
   <label class="flex items-center gap-1.5 cursor-pointer"><input id="use-index" type="checkbox" checked class="accent-violet-500"> Search forum</label>
   <select id="model" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs"><option>Phi-3.5-mini-instruct-q4f16_1-MLC</option><option>Llama-3.2-1B-Instruct-q4f32_1-MLC</option></select>
  </div>
 </div>
 <div class="border-t border-slate-900 px-4 py-1 flex justify-between text-[11px] text-slate-500 max-w-6xl mx-auto"><span id="index-status">Loading index…</span><span id="model-status">Model: idle</span></div>
</header>

<main class="flex-1 max-w-3xl w-full mx-auto flex flex-col">
 <div id="chat" class="flex-1 overflow-y-auto px-4 py-6"><div id="messages" class="space-y-4"></div></div>
 <div class="sticky bottom-0 bg-[#030712] border-t border-slate-900 p-3">
  <div class="flex gap-2"><textarea id="input" rows="1" placeholder="Ask about citizenship, laws, Concordat…" class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-sm outline-none resize-none"></textarea><button id="send" class="px-4 py-2 bg-violet-600 rounded-xl text-sm disabled:opacity-50">Send</button></div>
 </div>
</main>
</div>

<script type="module">
import { CreateMLCEngine } from "@mlc-ai/web-llm";
const useAI = document.getElementById('use-ai');
const useIndex = document.getElementById('use-index');
const modelSel = document.getElementById('model');
const idxStatus = document.getElementById('index-status');
const mdlStatus = document.getElementById('model-status');
const msgs = document.getElementById('messages');
const input = document.getElementById('input');
const send = document.getElementById('send');

let engine=null, forum=[];
fetch('./forum-index.json').then(r=>r.json()).then(d=>{forum=d; idxStatus.textContent=`Loaded ${forum.length} topics`}).catch(()=>{idxStatus.textContent='No index'; useIndex.checked=false});

function search(q){ const t=q.toLowerCase().split(/\W+/).filter(w=>w.length>2); return forum.map(f=>{const txt=(f.title+' '+f.excerpt).toLowerCase(); let s=0; t.forEach(w=>{if(txt.includes(w))s++}); return {...f,score:s}}).filter(f=>f.score>0).sort((a,b)=>b.score-a.score).slice(0,5); }

function add(role,html){ const d=document.createElement('div'); d.className='flex '+(role==='user'?'justify-end':'justify-start'); d.innerHTML=`<div class="max-w-[85%] rounded-2xl px-4 py-2 text-sm ${role==='user'?'bg-indigo-600/20 border border-indigo-500/30':'bg-slate-900 border border-slate-800'}">${html}</div>`; msgs.appendChild(d); msgs.parentElement.scrollTop=msgs.parentElement.scrollHeight; }

async function init(){ if(!useAI.checked) return; mdlStatus.textContent='Loading…'; try{ engine=await CreateMLCEngine(modelSel.value,{initProgressCallback:p=>mdlStatus.textContent=`${Math.round(p.progress*100)}%`}); mdlStatus.textContent='Ready'; send.disabled=false; }catch(e){mdlStatus.textContent='Error';} }

useAI.onchange=()=>{ if(useAI.checked &&!engine) init(); mdlStatus.textContent = useAI.checked? (engine?'Ready':'idle') : 'Off'; send.disabled =!useAI.checked &&!useIndex.checked; };
useIndex.onchange=()=>{ send.disabled =!useAI.checked &&!useIndex.checked; };

async function handle(){
 const q=input.value.trim(); if(!q) return; input.value=''; add('user',q);
 const results = useIndex.checked? search(q) : [];

 if(!useAI.checked){
   // AI OFF — just show forum results
   if(!results.length){ add('assistant','No matching forum topics found.'); return; }
   const html = results.map(r=>`<div class="mb-3"><a href="${r.url}" target="_blank" class="text-violet-300 hover:underline font-medium">${r.title}</a><div class="text-xs text-slate-400 mt-1">${r.excerpt||''}</div></div>`).join('');
   add('assistant', `<div class="text-[11px] uppercase text-slate-500 mb-2">Top forum matches</div>${html}`);
   return;
 }

 // AI ON
 if(!engine) await init();
 const context = results.length? `\n\nRelevant TEP forum threads:\n${results.map(r=>`- ${r.title}: ${r.url}`).join('\n')}` : '';
 const messages = [{role:'system',content:'You are TEP assistant. Answer concisely and cite forum links when given.'},{role:'user',content:q+context}];
 const el = document.createElement('div'); add('assistant',''); msgs.lastChild.querySelector('div>div').appendChild(el);
 const stream = await engine.chat.completions.create({messages,stream:true,temperature:0.3});
 let out=''; for await(const c of stream){ out+=c.choices[0].delta.content||''; el.textContent=out; }
}

send.onclick=handle; input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handle()}};
init();
add('assistant','Toggle "Use AI model" off for instant forum search, or leave it on for AI answers using forum results.');
</script>
</body>
</html>
