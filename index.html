<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEP Community Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">{"imports":{"@mlc-ai/web-llm":"https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.79/+esm"}}</script>
</head>
<body class="bg-[#030712] text-slate-200">
<header class="sticky top-0 bg-slate-950 border-b border-slate-800 p-3">
 <div class="max-w-5xl mx-auto flex flex-wrap gap-3 justify-between items-center">
  <h1 class="font-bold">TEP Assistant</h1>
  <div class="flex gap-4 text-xs">
   <label class="flex items-center gap-1"><input id="toggle-ai" type="checkbox" checked> Use AI LLM</label>
   <label class="flex items-center gap-1"><input id="toggle-forum" type="checkbox" checked> Search Forum</label>
   <label class="flex items-center gap-1"><input id="toggle-faq" type="checkbox" checked> Use Assistant</label>
   <select id="model" class="bg-slate-900 border border-slate-700 rounded px-1">
    <option>Phi-3.5-mini-instruct-q4f16_1-MLC</option>
   </select>
  </div>
 </div>
 <div class="max-w-5xl mx-auto flex justify-between text- text-slate-500 mt-1">
  <span id="idx">Loading…</span><span id="mdl">idle</span>
 </div>
</header>

<main class="max-w-3xl mx-auto p-4 h-[calc(100vh-110px)] flex flex-col">
 <div id="msgs" class="flex-1 overflow-y-auto space-y-2 mb-3"></div>
 <div class="flex gap-2">
  <input id="in" class="flex-1 bg-slate-900 border border-slate-800 rounded px-3 py-2 text-sm" placeholder="Type...">
  <button id="send" class="px-4 bg-violet-600 rounded text-sm disabled:opacity-50">Send</button>
 </div>
</main>

<script type="module">
import { CreateMLCEngine } from "@mlc-ai/web-llm";

const toggleAI = document.getElementById('toggle-ai');
const toggleForum = document.getElementById('toggle-forum');
const toggleFAQ = document.getElementById('toggle-faq');
const modelSel = document.getElementById('model');
const idx = document.getElementById('idx');
const mdl = document.getElementById('mdl');
const msgs = document.getElementById('msgs');
const input = document.getElementById('in');
const sendBtn = document.getElementById('send');

let engine=null, forum=[], hist=[{role:'system',content:'You are TEP helper'}];

const FAQS=[
 {k:['citizen','citizenship','become a citizen'], a:'CITIZENSHIP\n1. Move WA to TEP\n2. Apply: https://forum.theeastpacific.com/t/citizenship-application\n3. Take oath\n4. Wait approval'},
 {k:['amendment','citizenship act','public official disclosure','poda'], a:'AMENDMENTS\n• Citizenship Act: https://forum.theeastpacific.com/t/citizenship-act\n• PODA: https://forum.theeastpacific.com/t/public-official-disclosure-act'},
 {k:['application','roster','citizenship applications'], a:'APPS & ROSTER\nApply: https://forum.theeastpacific.com/t/citizenship-application\nRoster: https://forum.theeastpacific.com/t/citizenship-roster'}
];

fetch('./forum-index.json').then(r=>r.json()).then(d=>{forum=d; idx.textContent=d.length+' topics'}).catch(()=>idx.textContent='no index');

function add(t,role){const d=document.createElement('div');d.className='p-2 rounded text-sm '+(role?'bg-indigo-900/30':'bg-slate-800');d.textContent=t;msgs.appendChild(d);msgs.scrollTop=99999}

function findFAQ(q){const l=q.toLowerCase();return FAQS.find(f=>f.k.some(k=>l.includes(k)))}

function search(q){const w=q.toLowerCase().split(/\W+/);return forum.map(f=>{let s=0;w.forEach(x=>{if((f.title+f.excerpt).toLowerCase().includes(x))s++});return{...f,s}}).filter(f=>f.s>0).sort((a,b)=>b.s-a.s).slice(0,3)}

async function load(){if(!toggleAI.checked)return;mdl.textContent='loading';sendBtn.disabled=true;engine=await CreateMLCEngine(modelSel.value,{initProgressCallback:p=>mdl.textContent=p.progress.toFixed(0)+'%'});mdl.textContent='ready';sendBtn.disabled=false}

toggleAI.onchange=()=>{if(toggleAI.checked&&!engine)load();else if(!toggleAI.checked){mdl.textContent='off';engine=null}}

async function go(){
 const q=input.value.trim();if(!q)return;input.value='';add(q,'user');

 // 1. FAQ
 if(toggleFAQ.checked){
   const f=findFAQ(q);
   if(f){add(f.a);return}
 }

 // 2. Forum only
 if(toggleForum.checked &&!toggleAI.checked){
   const hits=search(q);
   add(hits.length?hits.map(h=>h.title+'\n'+h.url).join('\n\n'):'No forum matches');
   return
 }

 // 3. AI
 if(toggleAI.checked){
   if(!engine){add('Model not loaded');return}
   let prompt=q;
   if(toggleForum.checked){const h=search(q);if(h.length)prompt+='\n\nContext:\n'+h.map(x=>x.title+' '+x.url).join('\n')}
   hist.push({role:'user',content:prompt});
   const out=document.createElement('div');out.className='p-2 rounded bg-slate-800 text-sm';msgs.appendChild(out);
   const stream=await engine.chat.completions.create({messages:hist,stream:true});
   let t='';for await(const c of stream){t+=c.choices[0].delta.content||'';out.textContent=t}
   hist.push({role:'assistant',content:t});
   return
 }

 add('All three toggles are off – turn one on');
}

sendBtn.onclick=go; input.onkeydown=e=>e.key==='Enter'&&go();
load();
</script>
</body>
</html>
