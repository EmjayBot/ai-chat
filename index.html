<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kainoa — TEP Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">{"imports":{"@mlc-ai/web-llm":"https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.79/+esm"}}</script>
</head>
<body class="bg-[#030712] text-slate-200 min-h-screen flex flex-col">
<header class="p-3 border-b border-slate-800 bg-slate-950">
 <div class="max-w-5xl mx-auto flex justify-between items-center">
  <div class="flex items-center gap-2"><div class="w-8 h-8 rounded bg-cyan-600 flex items-center justify-center font-bold">K</div><span class="font-semibold">Kainoa</span></div>
  <div class="flex gap-2 text-xs">
   <label><input id="ai" type="checkbox"> AI</label>
   <label><input id="forum" type="checkbox" checked> Forum</label>
   <label><input id="kainoa" type="checkbox" checked> Kainoa</label>
  </div>
 </div>
 <div class="max-w-5xl mx-auto text- text-slate-500 flex justify-between mt-1"><span id="status">Loading...</span><span id="aistatus">AI off</span></div>
</header>

<main class="flex-1 max-w-3xl mx-auto w-full p-4 flex flex-col">
 <div id="chat" class="flex-1 overflow-y-auto space-y-3 mb-3"></div>
 <div class="flex gap-2"><input id="in" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm" placeholder="Ask Kainoa..."><button id="send" class="bg-cyan-600 px-4 rounded-lg text-sm">Send</button></div>
</main>

<script type="module">
import {CreateMLCEngine} from "@mlc-ai/web-llm";
const ai=document.getElementById('ai'),forum=document.getElementById('forum'),kainoa=document.getElementById('kainoa'),status=document.getElementById('status'),aistatus=document.getElementById('aistatus'),chat=document.getElementById('chat'),inp=document.getElementById('in'),btn=document.getElementById('send');
let engine=null, forumData=[], kainoaData=[], ready=false;

async function loadData(){
 try{
   const [f,k]=await Promise.all([
     fetch('./forum-index.json').then(r=>r.ok?r.json():[]),
     fetch('./responses.json').then(r=>r.ok?r.json():[])
   ]);
   forumData=f; kainoaData=k; ready=true;
   status.textContent = `${f.length} forum topics • ${k.length} Kainoa answers loaded`;
   console.log('Kainoa loaded:',k);
 }catch(e){ status.textContent='Error loading data'; console.error(e) }
}
loadData();

function add(msg,user){const d=document.createElement('div');d.className='p-2.5 rounded-lg text-sm max-w-[85%] '+(user?'bg-cyan-900/30 ml-auto':'bg-slate-800');d.style.whiteSpace='pre-wrap';d.textContent=msg;chat.appendChild(d);chat.scrollTop=1e9}

function findKainoa(q){
 if(!kainoa.checked ||!ready) return null;
 const query=q.toLowerCase();
 // check each keyword
 for(const item of kainoaData){
   for(const kw of item.keywords){
     if(query.includes(kw.toLowerCase())){
       console.log('Matched Kainoa:', item.id, 'on keyword:', kw);
       return item;
     }
   }
 }
 return null;
}

async function send(){
 const q=inp.value.trim(); if(!q||!ready) return; inp.value=''; add(q,true);

 // 1. KAINOA FIRST
 const match=findKainoa(q);
 if(match){
   add(`🌺 ${match.answer}`);
   return;
 }

 // 2. Forum only
 if(forum.checked &&!ai.checked){
   const hits=forumData.filter(f=>q.toLowerCase().split(' ').some(w=>f.title.toLowerCase().includes(w))).slice(0,3);
   add(hits.length? hits.map(h=>h.title+'\n'+h.url).join('\n\n') : 'No forum matches');
   return;
 }

 // 3. AI
 if(ai.checked){
   if(!engine){aistatus.textContent='loading...';engine=await CreateMLCEngine('Phi-3.5-mini-instruct-q4f16_1-MLC',{initProgressCallback:p=>aistatus.textContent=Math.round(p.progress*100)+'%'});aistatus.textContent='ready'}
   const out=document.createElement('div');out.className='p-2.5 bg-slate-800 rounded-lg text-sm';chat.appendChild(out);
   const stream=await engine.chat.completions.create({messages:[{role:'user',content:q}],stream:true});let t='';for await(const c of stream){t+=c.choices[0].delta.content||'';out.textContent=t}
   return;
 }
 add('Enable Kainoa, Forum, or AI');
}
btn.onclick=send; inp.onkeydown=e=>e.key==='Enter'&&send();
add("Aloha! I'm Kainoa. Try typing 'citizenship' — I should answer instantly from responses.json");
</script>
</body>
</html>
