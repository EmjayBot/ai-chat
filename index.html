<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEP Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">{"imports":{"@mlc-ai/web-llm":"https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.79/+esm"}}</script>
</head>
<body class="bg-[#030712] text-slate-200">
<header class="p-3 border-b border-slate-800">
 <div class="max-w-5xl mx-auto flex justify-between">
  <b>TEP Assistant</b>
  <div class="flex gap-3 text-xs">
   <label><input id="ai" type="checkbox" checked> AI</label>
   <label><input id="forum" type="checkbox" checked> Forum</label>
   <label><input id="faq" type="checkbox" checked> Assistant</label>
  </div>
 </div>
 <div class="max-w-5xl mx-auto text-[11px] text-slate-500 flex justify-between"><span id="s1">loading...</span><span id="s2"></span></div>
</header>
<main class="max-w-2xl mx-auto p-4">
 <div id="m" class="h-[70vh] overflow-y-auto space-y-2 mb-2"></div>
 <div class="flex gap-2"><input id="i" class="flex-1 bg-slate-900 border border-slate-800 rounded px-2 py-1 text-sm"><button id="go" class="bg-violet-600 px-3 rounded text-sm">Send</button></div>
</main>
<script type="module">
import {CreateMLCEngine} from "@mlc-ai/web-llm";
const ai=document.getElementById('ai'), forum=document.getElementById('forum'), faq=document.getElementById('faq');
const s1=document.getElementById('s1'), s2=document.getElementById('s2'), m=document.getElementById('m'), inp=document.getElementById('i'), btn=document.getElementById('go');
let engine=null, forumIdx=[], responses=[], hist=[{role:'system',content:'Helpful TEP assistant'}];

// LOAD BOTH JSON FILES
Promise.all([
 fetch('./forum-index.json').then(r=>r.json()).catch(()=>[]),
 fetch('./responses.json').then(r=>r.json()).catch(()=>[])
]).then(([f,r])=>{
 forumIdx=f; responses=r;
 s1.textContent=`${f.length} forum topics, ${r.length} canned answers`;
});

function add(t,u){const d=document.createElement('div');d.className='p-2 rounded text-sm '+(u?'bg-indigo-900/40':'bg-slate-800');d.style.whiteSpace='pre-wrap';d.textContent=t;m.appendChild(d);m.scrollTop=1e9}

function matchFAQ(q){
 if(!faq.checked||!responses.length) return null;
 const l=q.toLowerCase();
 return responses.find(r=>r.keywords.some(k=>l.includes(k.toLowerCase())));
}

function search(q){
 if(!forum.checked) return [];
 const w=q.toLowerCase().split(/\W+/);
 return forumIdx.map(x=>{let s=0;w.forEach(t=>{if((x.title+x.excerpt).toLowerCase().includes(t))s++});return{...x,s}}).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,3);
}

async function ensureAI(){if(!ai.checked||engine) return; s2.textContent='loading AI'; btn.disabled=true; engine=await CreateMLCEngine('Phi-3.5-mini-instruct-q4f16_1-MLC',{initProgressCallback:p=>s2.textContent=Math.round(p.progress*100)+'%'}); s2.textContent='ready'; btn.disabled=false}

ai.onchange=()=>{if(ai.checked)ensureAI();else{s2.textContent='off';engine=null}}

async function send(){
 const q=inp.value.trim();if(!q)return;inp.value='';add(q,true);
 const f=matchFAQ(q);
 if(f){add(f.answer); const hits=search(q); if(hits.length) add('Related:\n'+hits.map(h=>h.title+'\n'+h.url).join('\n\n')); return}
 if(forum.checked&&!ai.checked){const h=search(q);add(h.length?h.map(x=>x.title+'\n'+x.url).join('\n\n'):'No matches');return}
 if(ai.checked){await ensureAI(); let p=q; const h=search(q); if(h.length)p+='\n\nForum:\n'+h.map(x=>x.title+' '+x.url).join('\n'); hist.push({role:'user',content:p}); const out=document.createElement('div');out.className='p-2 bg-slate-800 rounded text-sm';m.appendChild(out); const s=await engine.chat.completions.create({messages:hist,stream:true}); let t=''; for await(const c of s){t+=c.choices[0].delta.content||'';out.textContent=t} hist.push({role:'assistant',content:t}); return}
 add('Turn on AI, Forum, or Assistant');
}
btn.onclick=send; inp.onkeydown=e=>e.key==='Enter'&&send(); ensureAI();
</script>
</body>
</html>
